name: Package and Release

on:
  release:
    types: [published]

permissions:
  contents: write   # to upload release assets
  id-token: write   # for cosign OIDC keyless signing

jobs:
  package:
    name: Package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    env:
      # renovate: datasource=github-releases depName=corazawaf/libcoraza
      LIBCORAZA_VERSION: v1.1.0
    strategy:
      matrix:
        arch: [amd64, arm64]
        include:
          - arch: amd64
            runner: ubuntu-22.04
            deb_arch: amd64
            rpm_arch: x86_64
          - arch: arm64
            runner: ubuntu-22.04-arm
            deb_arch: arm64
            rpm_arch: aarch64

    steps:
      - name: Checkout repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Grab libcoraza-${{ env.LIBCORAZA_VERSION }} cache
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5
        id: cache-libcoraza
        with:
          path: libcoraza-*
          key: libcoraza-${{ env.LIBCORAZA_VERSION }}-${{ matrix.arch }}

      - name: Download libcoraza
        if: steps.cache-libcoraza.outputs.cache-hit != 'true'
        run: |
          cd ${{ github.workspace }}
          wget https://github.com/corazawaf/libcoraza/archive/refs/tags/${{ env.LIBCORAZA_VERSION }}.zip
          unzip -o ${{ env.LIBCORAZA_VERSION }}.zip

      - name: Install build dependencies
        run: |
          sudo apt-get -qq update
          sudo apt-get -y -qq \
            --fix-missing --no-install-recommends install \
            gcc make apache2-dev libapr1-dev libaprutil1-dev \
            ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: ^1.21.x

      - name: Configure environment
        run: |
          export LD_LIBRARY_PATH=/usr/local/lib
          export LIBRARY_PATH=/usr/local/lib
          export C_INCLUDE_PATH=/usr/local/include

      - name: Build libcoraza
        run: |
          cd libcoraza-*
          ./build.sh
          ./configure
          make
          sudo make install
          sudo ldconfig

      - name: Build mod_coraza
        run: make

      - name: Create packages
        run: |
          # Strip leading 'v' from tag (e.g. v1.2.3 -> 1.2.3)
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"

          PKGBASE="coraza-apache_${VERSION}_${{ matrix.arch }}"

          # Debian package layout
          mkdir -p /tmp/pkg-deb/usr/lib/apache2/modules
          mkdir -p /tmp/pkg-deb/usr/local/lib
          cp src/.libs/mod_coraza.so /tmp/pkg-deb/usr/lib/apache2/modules/mod_coraza.so
          cp /usr/local/lib/libcoraza.so /tmp/pkg-deb/usr/local/lib/libcoraza.so

          fpm -s dir -t deb \
            -n coraza-apache \
            -v "${VERSION}" \
            --description "Coraza WAF Apache module" \
            --url "https://github.com/corazawaf/coraza-apache" \
            --license "Apache-2.0" \
            --architecture ${{ matrix.deb_arch }} \
            --maintainer "Coraza <security@coraza.io>" \
            --vendor "Coraza" \
            -C /tmp/pkg-deb \
            --package "${PKGBASE}.deb" \
            .

          # RPM package layout
          mkdir -p /tmp/pkg-rpm/usr/lib64/httpd/modules
          mkdir -p /tmp/pkg-rpm/usr/local/lib
          cp src/.libs/mod_coraza.so /tmp/pkg-rpm/usr/lib64/httpd/modules/mod_coraza.so
          cp /usr/local/lib/libcoraza.so /tmp/pkg-rpm/usr/local/lib/libcoraza.so

          fpm -s dir -t rpm \
            -n coraza-apache \
            -v "${VERSION}" \
            --description "Coraza WAF Apache module" \
            --url "https://github.com/corazawaf/coraza-apache" \
            --license "Apache-2.0" \
            --architecture ${{ matrix.rpm_arch }} \
            --maintainer "Coraza <security@coraza.io>" \
            --vendor "Coraza" \
            -C /tmp/pkg-rpm \
            --package "${PKGBASE}.rpm" \
            .

          mv "${PKGBASE}.deb" "${{ github.workspace }}/"
          mv "${PKGBASE}.rpm" "${{ github.workspace }}/"

      - name: Upload packages as artifacts for install tests
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: packages-${{ matrix.arch }}
          path: |
            ${{ github.workspace }}/coraza-apache_*_${{ matrix.arch }}.deb
            ${{ github.workspace }}/coraza-apache_*_${{ matrix.arch }}.rpm
          retention-days: 1

      - name: Install cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Sign packages with cosign (keyless)
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          PKGBASE="coraza-apache_${VERSION}_${{ matrix.arch }}"

          cosign sign-blob --yes \
            --bundle "${PKGBASE}.deb.bundle" \
            "${PKGBASE}.deb"

          cosign sign-blob --yes \
            --bundle "${PKGBASE}.rpm.bundle" \
            "${PKGBASE}.rpm"

      - name: Upload packages and signatures to release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: |
            coraza-apache_*_${{ matrix.arch }}.deb
            coraza-apache_*_${{ matrix.arch }}.deb.bundle
            coraza-apache_*_${{ matrix.arch }}.rpm
            coraza-apache_*_${{ matrix.arch }}.rpm.bundle

  install-test:
    name: Install test (${{ matrix.pkg_type }}, ${{ matrix.arch }})
    needs: package
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        arch: [amd64, arm64]
        pkg_type: [deb, rpm]
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: packages-${{ matrix.arch }}

      - name: Test deb installation
        if: matrix.pkg_type == 'deb'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends apache2
          sudo dpkg -i coraza-apache_*_${{ matrix.arch }}.deb
          sudo ldconfig
          test -f /usr/lib/apache2/modules/mod_coraza.so
          test -f /usr/local/lib/libcoraza.so

      - name: Test rpm installation
        if: matrix.pkg_type == 'rpm'
        run: |
          docker run --rm \
            -v "$PWD:/packages:ro" \
            rockylinux:9 \
            bash -c "
              dnf install -y httpd &&
              rpm -ivh /packages/coraza-apache_*_${{ matrix.arch }}.rpm &&
              ldconfig &&
              test -f /usr/lib64/httpd/modules/mod_coraza.so &&
              test -f /usr/local/lib/libcoraza.so
            "
