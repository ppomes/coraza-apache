LoadModule coraza_module modules/mod_coraza.so

Coraza On
CorazaRules "SecRuleEngine On"
CorazaRules "SecRequestBodyAccess On"

<Location /blocked>
    CorazaRules "SecRule REQUEST_URI \"@streq /blocked\" \"id:1,phase:1,deny,status:403\""
</Location>

<Location /body-test>
    CorazaRules "SecRule REQUEST_BODY \"@contains attack\" \"id:2,phase:2,deny,status:403\""
</Location>
