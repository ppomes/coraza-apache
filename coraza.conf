LoadModule coraza_module modules/mod_coraza.so

Coraza On
SecRuleEngine On
SecRequestBodyAccess On

<Location /blocked>
    SecRule REQUEST_URI "@streq /blocked" "id:1,phase:1,deny,status:403"
</Location>

<Location /body-test>
    SecRule REQUEST_BODY "@contains attack" "id:2,phase:2,deny,status:403"
</Location>
